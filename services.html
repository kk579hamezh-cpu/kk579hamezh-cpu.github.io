            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: #1a1a2e;
            --accent-purple: #8b5cf6;
            --accent-blue: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #b8b8cc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #0f0f1e 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 15, 0.7);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 3rem;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Services Section */
        .services {
            min-height: 100vh;
            padding: 8rem 3rem 3rem;
            position: relative;
        }

        .services::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .services-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .section-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter System */
        .filter-system {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .filter-btn {
            padding: 0.7rem 1.5rem;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .service-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.2));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.2);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .service-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .service-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .service-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .skill-count {
            color: var(--accent-blue);
            font-size: 0.9rem;
            font-weight: 600;
        }

            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .explore-btn:hover {
            transform: scale(1.05);
        }

        /* Skills Display */
        .skills-display {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        .skills-display.active {
            display: block;
        }

        .skills-category {
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .skills-category-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .skill-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .skill-card:hover {

            background: rgba(255, 255, 255, 0.08);

        }

        .skill-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .skill-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

            font-size: 0.75rem;

        }

            from {

                transform: translateY(30px);

            }

                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }

            }
        }
    </style>
</head>

                        name: '📝 Content Writing',
                        skills: [
                            { name: 'Creative Writing', description: 'Compelling creative copy and storytelling', level: 'professional' },
                            { name: 'Blog Writing', description: 'Professional blog post creation', level: 'professional' },
                            { name: 'Social Media Copywriting', description: 'Engaging social media copy', level: 'professional' },
                            { name: 'Website Content', description: 'Professional website copy and messaging', level: 'professional' }
                        ]
                    },
                    {
                        name: '🎬 Script & Story',
                        skills: [
                            { name: 'Video Script Writing', description: 'Professional video scripts', level: 'professional' },
                            { name: 'Story Development', description: 'Narrative structure and story arcs', level: 'professional' },
                            { name: 'Short-form Scripts', description: 'Scripts for short-form content', level: 'professional' }
                        ]
                    },
                    {
                        name: '🧠 Strategy',
                        skills: [
                            { name: 'Content Strategy', description: 'Comprehensive content planning', level: 'professional' },
                            { name: 'Content Calendar', description: 'Editorial calendars and planning', level: 'professional' },
                            { name: 'Audience Research', description: 'Audience insight and research', level: 'professional' }
                        ]
                    },
                    {
                        name: '💬 Brand Communication',
                        skills: [
                            { name: 'Brand Voice', description: 'Distinctive brand voice development', level: 'professional' },
                            { name: 'Brand Messaging', description: 'Core brand messaging strategy', level: 'professional' },
                            { name: 'Communication Strategy', description: 'Strategic communication planning', level: 'professional' }
                        ]
                    },
                    {
                        name: '🤖 AI Content',
                        skills: [
                            { name: 'AI Content Enhancement', description: 'AI-powered content improvement', level: 'professional' },
                            { name: 'Prompt-Based Creation', description: 'AI-assisted content creation', level: 'professional' },
                            { name: 'Content Optimization', description: 'AI-based content optimization', level: 'intermediate' }
                        ]
                    }
                ]
            }
        ];

        let currentService = null;

        function renderServices(filter = 'all') {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';

            const filtered = filter === 'all' 
                ? servicesData 
                : servicesData.filter(s => s.category === filter);

            filtered.forEach((service, index) => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.style.animation = `fadeInUp 0.6s ease-out ${index * 0.1}s both`;
                card.innerHTML = `
                    <div class="service-icon">${service.icon}</div>
                    <div class="service-title">${service.title}</div>
                    <div class="service-description">${service.description}</div>
                    <div class="service-meta">
                        <div class="skill-count">${service.skillCount} Skills</div>
                        <button class="explore-btn" onclick="expandService('${service.id}')">Explore</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function expandService(serviceId) {
            const service = servicesData.find(s => s.id === serviceId);
            currentService = service;

            document.getElementById('servicesGrid').style.display = 'none';
            document.getElementById('filterSystem').style.display = 'none';
            document.querySelector('.section-header').style.display = 'none';
            document.querySelector('.back-btn').classList.add('active');

            const skillsDisplay = document.getElementById('skillsDisplay');
            skillsDisplay.innerHTML = `<h2 style="font-size: 2rem; margin-bottom: 2rem;">${service.icon} ${service.title}</h2>`;

            service.subcategories.forEach((subcategory, index) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'skills-category';
                categoryDiv.style.animation = `fadeInUp 0.6s ease-out ${index * 0.1}s both`;

                const titleDiv = document.createElement('div');
                titleDiv.className = 'skills-category-title';
                titleDiv.textContent = subcategory.name;

                const skillsGridDiv = document.createElement('div');
                skillsGridDiv.className = 'skills-grid';

                subcategory.skills.forEach(skill => {
                    const skillCard = document.createElement('div');
                    skillCard.className = 'skill-card';
                    const expertiseClass = `expertise-${skill.level.toLowerCase()}`;
                    skillCard.innerHTML = `
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-description">${skill.description}</div>
                        <div class="expertise-badge ${expertiseClass}">
                            ${skill.level === 'professional' ? '🟣' : skill.level === 'intermediate' ? '🔵' : '⚪'} 
                            ${skill.level}
                        </div>
                    `;
                    skillsGridDiv.appendChild(skillCard);
                });

                categoryDiv.appendChild(titleDiv);
                categoryDiv.appendChild(skillsGridDiv);
                skillsDisplay.appendChild(categoryDiv);
            });

            skillsDisplay.classList.add('active');
        }

        function goBack() {
            document.getElementById('skillsDisplay').classList.remove('active');
            document.getElementById('skillsDisplay').innerHTML = '';
            document.getElementById('servicesGrid').style.display = 'grid';
            document.getElementById('filterSystem').style.display = 'flex';
            document.querySelector('.section-header').style.display = 'block';
            document.querySelector('.back-btn').classList.remove('active');
            currentService = null;
        }

        function filterServices(category) {
            // Update filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderServices(category);
        }

        // Initial render
        renderServices();
    </script>
</body>
</html>
